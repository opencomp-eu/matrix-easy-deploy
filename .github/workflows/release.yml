name: Release Pipeline

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: matrix-easy-deploy

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      archive_name: ${{ steps.meta.outputs.archive_name }}
      dockerhub_enabled: ${{ steps.channels.outputs.dockerhub_enabled }}
      homebrew_enabled: ${{ steps.channels.outputs.homebrew_enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f VERSION ]]; then
            echo "VERSION file is missing" >&2
            exit 1
          fi

          VERSION_RAW="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "$VERSION_RAW" ]]; then
            echo "VERSION cannot be empty" >&2
            exit 1
          fi

          if [[ ! "$VERSION_RAW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be semver-like (e.g. 1.2.3), got: $VERSION_RAW" >&2
            exit 1
          fi

          TAG="v${VERSION_RAW}-r${GITHUB_RUN_NUMBER}"
          ARCHIVE_NAME="matrix-easy-deploy-${TAG}.tar.gz"

          echo "version=$VERSION_RAW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally"
          else
            git tag -a "$TAG" -m "Release $TAG"
          fi

          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin"
          else
            git push origin "$TAG"
          fi

      - name: Create source archive
        env:
          ARCHIVE_NAME: ${{ steps.meta.outputs.archive_name }}
          TAG: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --prefix="matrix-easy-deploy-${TAG}/" -o "$ARCHIVE_NAME" HEAD
          sha256sum "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            ${{ steps.meta.outputs.archive_name }}
            ${{ steps.meta.outputs.archive_name }}.sha256

      - name: Detect optional publish channels
        id: channels
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          HOMEBREW_TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${HOMEBREW_TAP_REPO}" && -n "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "homebrew_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "homebrew_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  github_release:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ needs.prepare.outputs.archive_name }}
            ${{ needs.prepare.outputs.archive_name }}.sha256

  docker_ghcr:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag }}
            ghcr.io/${{ github.repository }}:release-latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.tag }}

  docker_dockerhub:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.dockerhub_enabled == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.tag }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:release-latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.tag }}

  homebrew_tap:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - github_release
    if: ${{ needs.prepare.outputs.homebrew_enabled == 'true' }}
    steps:
      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Compute archive checksum
        id: checksum
        shell: bash
        run: |
          set -euo pipefail
          SHA="$(sha256sum "${{ needs.prepare.outputs.archive_name }}" | awk '{print $1}')"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap formula
        env:
          TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ steps.checksum.outputs.sha }}
          ARCHIVE_NAME: ${{ needs.prepare.outputs.archive_name }}
        shell: bash
        run: |
          set -euo pipefail

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap

          mkdir -p tap/Formula
          cat > tap/Formula/med-kit.rb <<EOF
          class MedKit < Formula
            desc "Matrix Easy Deploy wizard"
            homepage "https://github.com/${{ github.repository }}"
            url "https://github.com/${{ github.repository }}/releases/download/${TAG}/${ARCHIVE_NAME}"
            sha256 "${SHA}"
            license "MIT"

            def install
              libexec.install Dir["*"]
              bin.install_symlink libexec/"matrix-wizard.sh" => "med-kit"
              bin.install_symlink libexec/"start.sh" => "med-kit-start"
              bin.install_symlink libexec/"stop.sh" => "med-kit-stop"
              bin.install_symlink libexec/"update.sh" => "med-kit-update"
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/med-kit.rb

          if git diff --cached --quiet; then
            echo "No formula changes to commit"
            exit 0
          fi

          git commit -m "chore: release ${TAG}"
          git push

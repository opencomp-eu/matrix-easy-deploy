services:
  mas:
    image: ghcr.io/element-hq/matrix-authentication-service:latest
    container_name: matrix_mas
    restart: unless-stopped
    environment:
      MAS_CONFIG: /config/config.yaml
    command: ["server", "-c", "/config/config.yaml"]
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    networks:
      - matrix_internal
      - caddy_net
    healthcheck:
      # Distroless image has no curl/wget; validate config via mas-cli (see #3741).
      # Uses --config= (not -c) — global/server -c does not apply to config check.
      test: ["CMD", "config", "check", "--config=/config/config.yaml"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  matrix_internal:
    external: true
    name: core_matrix_internal
  caddy_net:
    external: true
    name: caddy_net

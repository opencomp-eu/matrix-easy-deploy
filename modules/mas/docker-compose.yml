services:
  mas:
    image: ghcr.io/element-hq/matrix-authentication-service:latest
    container_name: matrix_mas
    restart: unless-stopped
    environment:
      MAS_CONFIG: /config/config.yaml
    command: ["server", "-c", "/config/config.yaml"]
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    networks:
      - matrix_internal
      - caddy_net
    healthcheck:
      # Distroless MAS image has no shell/curl/wget; mas-cli config check is the
      # supported in-container probe (see element-hq/matrix-authentication-service#3741).
      test: ["CMD", "config", "check", "-c", "/config/config.yaml"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

networks:
  matrix_internal:
    external: true
    name: core_matrix_internal
  caddy_net:
    external: true
    name: caddy_net

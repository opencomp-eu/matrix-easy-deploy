services:
  coturn:
    image: coturn/coturn:latest
    container_name: matrix_coturn
    restart: unless-stopped
    # host networking is required so coturn can bind UDP relay ports directly
    # and report the correct external IP to WebRTC clients.
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

  livekit:
    image: livekit/livekit-server:latest
    container_name: matrix_livekit
    restart: unless-stopped
    # Host networking binds WebRTC UDP ports on the host directly (no per-port
    # docker-proxy processes). Caddy reaches the API on host.docker.internal:7880.
    network_mode: host
    command: --config /livekit.yaml
    volumes:
      - ./livekit/livekit.yaml:/livekit.yaml:ro

  lk-jwt-service:
    image: ghcr.io/element-hq/lk-jwt-service:latest
    container_name: matrix_lk_jwt_service
    restart: unless-stopped
    environment:
      LIVEKIT_URL: wss://${LIVEKIT_DOMAIN}/livekit/sfu
      LIVEKIT_KEY: ${LIVEKIT_KEY}
      LIVEKIT_SECRET: ${LIVEKIT_SECRET}
      LIVEKIT_FULL_ACCESS_HOMESERVERS: ${SERVER_NAME}
    depends_on:
      - livekit
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true
    name: caddy_net
